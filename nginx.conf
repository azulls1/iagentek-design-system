# nginx config para servir el SPA + reverse proxy a Supabase (mismo origen → sin CORS).

server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Tamaño max para uploads (logos, etc.)
    client_max_body_size 25M;

    # ── Reverse proxy a Supabase (auth/rest/functions) ─────────────
    # El cliente habla con designsystem.iagentek.com.mx/auth/...
    # nginx reenvia a iagenteksupabase.iagentek.com.mx → no hay CORS
    # porque el browser ve un solo origen.

    location ~ ^/(auth|rest|functions)/ {
        proxy_pass https://iagenteksupabase.iagentek.com.mx;
        proxy_http_version 1.1;
        proxy_set_header Host iagenteksupabase.iagentek.com.mx;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_ssl_server_name on;

        # Timeouts generosos para edge functions cold-start
        proxy_connect_timeout 30s;
        proxy_read_timeout 60s;
        proxy_send_timeout 60s;
    }

    # ── SPA: todas las rutas no-asset van a index.html ───────────
    location / {
        try_files $uri $uri/ /index.html;
    }

    # ── Cache largo para assets fingerprinted por Vite ───────────
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|webp|woff|woff2|ttf|eot)$ {
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    # ── No cache para index.html (debe revalidar) ────────────────
    location = /index.html {
        expires -1;
        add_header Cache-Control "no-store, no-cache, must-revalidate";
    }

    # ── Headers de seguridad básicos ─────────────────────────────
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
}
