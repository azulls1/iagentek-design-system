name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ci:
    name: lint · test · build
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint --max-warnings 300

      - name: Test
        run: npm test

      - name: Build
        env:
          VITE_SUPABASE_URL: https://iagenteksupabase.iagentek.com.mx
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}
          VITE_MINIO_ENDPOINT: https://iagentekminioback.iagentek.com.mx
          VITE_MINIO_ACCESS_KEY: ${{ secrets.VITE_MINIO_ACCESS_KEY }}
          VITE_MINIO_SECRET_KEY: ${{ secrets.VITE_MINIO_SECRET_KEY }}
          VITE_MINIO_BUCKET: iagentek-designsystem-assets
        run: npm run build

      - name: Upload build artifact
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/
          retention-days: 7
